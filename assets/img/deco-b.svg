<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 420">
  <defs>
    <radialGradient id="bg1" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="55%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#7c1d0c"/>
    </radialGradient>
    <radialGradient id="bg2" cx="65%" cy="65%" r="55%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Orange blob circle -->
  <circle cx="190" cy="230" r="195" fill="url(#bg1)"/>
  <!-- Purple overlay -->
  <circle cx="220" cy="270" r="145" fill="url(#bg2)"/>
  <!-- Letter B transparent -->
  <text x="18" y="370" font-family="Georgia,serif" font-size="380" font-weight="900"
        fill="rgba(0,0,0,0.18)" letter-spacing="-20">B</text>
  <!-- Letter B white ghost -->
  <text x="18" y="370" font-family="Georgia,serif" font-size="380" font-weight="900"
        fill="rgba(255,255,255,0.08)" letter-spacing="-20">B</text>
</svg>